<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    
    <!-- You can replace vite.svg with a picture of a burger later! -->
    <link rel="icon" type="image/svg+xml" href="/FrontendUB/src/assets/UBLOGO.svg" />
    
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    
    <!-- 1. The Title shown in the browser tab -->
    <title>Ultimate Burger and Pizza</title>

    <!-- 2. Adding a premium font (Poppins) to make Tailwind look amazing -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  </head>
  
  <!-- 3. Telling Tailwind to use our new font as the default -->
  <body class="font-[Poppins] antialiased text-gray-800 bg-gray-50">
    
    <!-- 4. This empty div is where React will inject your entire app! -->
    <div id="root"></div>
    
    <!-- 5. This tells Vite where your React code starts -->
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
